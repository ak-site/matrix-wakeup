<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matrix Wakeup</title>
    <meta name="description" content="01001101 01100001 01110100 01110010" />
    <link rel="shortcut icon" href="images/favicon.ico" />
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        padding: 0;
        margin: 0;
        overflow: hidden;
        background: #000;
      }

      .github-center {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        z-index: 10;
        transform: translateX(-50%);
      }

      .github-link {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        align-items: center;
        padding: 0.5rem 1rem;
        font-family: monospace;
        font-size: 0.875rem;
        color: #3effdc;
        text-decoration: none;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 0.5rem;
        transition: background 0.2s ease;
      }

      .github-link:hover {
        color: #6effea;
        background: rgba(0, 0, 0, 0.7);
      }

      .github-link svg {
        color: #3effdc;
      }
    </style>
  </head>
  <body>
    <div class="github-center">
      <a
        href="https://github.com/ak-site/matrix-wakeup"
        class="github-link"
        target="_blank"

    <script src="matrix-wakeup.min.js"></script>
    <script>
      const matrix = new MatrixWakeup({
        assembly: {
          targetPhrase: "THE MATRIX",
          cycleDurations: {
            collecting: 2000,
            showing: 3000,
            dissipating: 1500,
            idle: 2500,
